<script>
document.addEventListener("DOMContentLoaded", function() {
  const map = {
    "Home": "Trang chủ",
    "Categories": "Danh mục",
    "Tags": "Thẻ",
    "Archives": "Lưu trữ",
    "About": "Giới thiệu",
    "Search": "Tìm kiếm"
  };

  document.querySelectorAll("*").forEach(el => {
    if (map[el.textContent.trim()]) {
      el.textContent = map[el.textContent.trim()];
    }
  });
});
</script>

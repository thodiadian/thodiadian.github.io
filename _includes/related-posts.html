<h3>Bài viết liên quan</h3>
<ul>
  {% assign count = 0 %}
  {% for post in site.posts limit: 6 %}
    {% if post.url != page.url and count < 5 %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </li>
      {% assign count = count | plus: 1 %}
    {% endif %}
  {% endfor %}
</ul>
